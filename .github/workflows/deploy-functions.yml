name: Deploy Supabase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Deploy Edge Functions
      run: |
        supabase functions deploy send-reminders --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    - name: Set Function Secrets
      run: |
        supabase secrets set VAPID_PUBLIC_KEY="${{ secrets.VAPID_PUBLIC_KEY }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        supabase secrets set VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        supabase secrets set VAPID_CONTACT="${{ secrets.VAPID_CONTACT }}" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
